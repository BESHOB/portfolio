      window.updateMetaTags = function(config) {

        const updateMeta = (property, content, isProperty = true) => {

            isProperty

              : `meta[name="${property}"]`
          );
          if (!element) {
            element = document.createElement('meta');
            element[isProperty ? 'property' : 'name'] = property;
            document.head.appendChild(element);
          }
          element.content = content;
        };

        // SEO Meta Tags

        if (config.description) updateMeta('description', config.description, false);
