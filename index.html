    <!-- Meta Tag Updater Script for SPA Blog Navigation -->
    <script>
      window.updateMetaTags = function(config) {
        // Update or create meta tags
        const updateMeta = (property, content, isProperty = true) => {
          let element = document.querySelector(
            isProperty 
              ? `meta[property="${property}"]` 
              : `meta[name="${property}"]`
          );
          if (!element) {
            element = document.createElement('meta');
            element[isProperty ? 'property' : 'name'] = property;
            document.head.appendChild(element);
          }
          element.content = content;
        };

        // SEO Meta Tags
        if (config.title) updateMeta('title', config.title, false);
        if (config.description) updateMeta('description', config.description, false);
        if (config.keywords) updateMeta('keywords', config.keywords, false);
        if (config.canonical) updateMeta('canonical', config.canonical, false);

        // Open Graph Tags
        if (config.og_title) updateMeta('og:title', config.og_title);
        if (config.og_description) updateMeta('og:description', config.og_description);
        if (config.og_image) updateMeta('og:image', config.og_image);
        if (config.og_url) updateMeta('og:url', config.og_url);
        if (config.og_type) updateMeta('og:type', config.og_type);

        // Twitter Card Tags
        if (config.twitter_title) updateMeta('twitter:title', config.twitter_title);
        if (config.twitter_description) updateMeta('twitter:description', config.twitter_description);
        if (config.twitter_image) updateMeta('twitter:image', config.twitter_image);
        if (config.twitter_card) updateMeta('twitter:card', config.twitter_card);

        // Update page title
        if (config.page_title) document.title = config.page_title;

        // Update Schema.org JSON-LD
        if (config.schema) {
          let schemaScript = document.querySelector('script[type="application/ld+json"]');
          if (schemaScript) {
            schemaScript.textContent = JSON.stringify(config.schema);
          }
        }
      };

      // Reset to default meta tags
      window.resetMetaTags = function() {
        window.updateMetaTags({
          page_title: 'Walid Belmahi - Creative Developer & Graphic Designer',
          title: 'Walid Belmahi - Creative Developer & Graphic Designer',
          description: 'Creative developer and graphic designer with 10+ years of experience. Specializing in web development, 3D animation, GPU shaders, and digital design.',
          og_title: 'Walid Belmahi - Creative Developer & Graphic Designer',
          og_description: 'Creative developer and graphic designer with 10+ years of experience.',
          og_image: 'https://walidpro.online/assets/hero-DJCM9H2_.png',

          twitter_image: 'https://walidpro.online/assets/hero-DJCM9H2_.png',
          twitter_card: 'summary_large_image'
        });
      };
    </script>
